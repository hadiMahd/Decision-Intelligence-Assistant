services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      - qdrant
    env_file:
      - ./.env
    environment:
      #QDRANT_URL: http://qdrant:6333
      #QDRANT_HOST: qdrant
      #QDRANT_PORT: 6333
    ports:
      - "8000:8000"

  frontent:
    build:
      context: ./frontent
      dockerfile: Dockerfile
    container_name: frontent
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontent:/app
      - /app/node_modules

volumes:
  qdrant_storage:
